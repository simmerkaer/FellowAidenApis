name = "fellow-aiden-proxy"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Serve on the workers.dev subdomain, but disable per-version preview URLs to
# shrink the surface of this credential relay.
workers_dev = true
preview_urls = false

# Lock the proxy to the demo's origins. The GitHub Pages site's Origin is just
# scheme+host (https://simmerkaer.github.io) even though it's served under a
# /FellowAidenApis/ subpath. localhost is included for local demo dev.
[vars]
ALLOWED_ORIGINS = "https://simmerkaer.github.io,http://localhost:5173"

# --- Per-IP rate limiting (Cloudflare Rate Limiting API) ---
# Applied to every request: caps overall abuse of the relay.
# period must be 10 or 60 (seconds).
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 60
  period = 60

# Stricter limit on login attempts only — deters credential stuffing, since
# this proxy relays real Fellow logins.
[[ratelimits]]
name = "LOGIN_RATE_LIMITER"
namespace_id = "1002"

  [ratelimits.simple]
  limit = 8
  period = 60
